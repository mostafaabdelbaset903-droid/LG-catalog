<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LG Catalog - الصفحة الرئيسية</title>
<link rel="stylesheet" href="soft-ui.css">

<style>

/* ===== CINEMATIC HERO ===== */

.heroSection{
  position:relative;
  height:120vh;
  display:flex;
  align-items:center;
  overflow:hidden;
}

.heroSticky{
  position:sticky;
  top:80px;
  width:100%;
}

.heroCard{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  align-items:center;
  gap:40px;
}

.heroLeft{
  padding:40px 0;
}

.heroTitle{
  font-size:44px;
  font-weight:950;
  line-height:1.2;
  margin:0 0 20px;
  opacity:0;
  transform:translateY(40px);
}

.heroSub{
  font-size:16px;
  color:var(--muted);
  line-height:1.9;
  max-width:520px;
  margin:0 0 30px;
  opacity:0;
  transform:translateY(40px);
}

.heroButtons{
  display:flex;
  gap:16px;
  opacity:0;
  transform:translateY(40px);
}

.heroRight{
  position:relative;
  height:520px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.heroProduct{
  max-height:520px;
  width:auto;
  transition:transform .2s linear;
  will-change:transform;
}

/* ===== CATEGORY SECTION ===== */

.cardsSection{
  margin-top:120px;
}

.cardsSection h2{
  font-size:28px;
  margin-bottom:30px;
  opacity:0;
  transform:translateY(40px);
}

/* ===== MOBILE ===== */

@media(max-width:900px){
  .heroCard{
    grid-template-columns:1fr;
    text-align:center;
  }
  .heroRight{
    height:320px;
  }
  .heroTitle{
    font-size:28px;
  }
}

</style>
</head>

<body>

<header>
<div class="wrap">
<div class="topbar">
<div>
<div class="title">كتالوج LG - الفرع</div>
<div class="subtitle">اختيار موديلات بسرعة + إرسال واتساب + لينك عرض للعميل</div>

<div class="nav">
<a class="active" href="index.html">الرئيسية</a>
<a href="ac.html">تكييفات</a>
<a href="washers.html">غسالات</a>
<a href="fridges.html">ثلاجات</a>
<a href="builtin.html">Built-in</a>
<a href="view.html">عرض العميل</a>
</div>
</div>

<button class="btn btnGhost" onclick="location.href='ac.html'">
ابدأ الاختيار
</button>
</div>
</div>
</header>

<div class="wrap">

<!-- HERO -->
<section class="heroSection">
  <div class="heroSticky">
    <div class="heroCard">

      <div class="heroLeft">
        <h1 class="heroTitle">تجربة LG الذكية.<br>أداء أقوى لعملائك.</h1>

        <p class="heroSub">
        اختار الموديلات بسرعة، أضفها للسلة،
        وابعت للعميل واتساب + لينك عرض احترافي خلال ثواني.
        </p>

        <div class="heroButtons">
          <button class="btn btnPrimary" onclick="location.href='washers.html'">
            ابدأ بالغسالات
          </button>

          <button class="btn btnGhost" onclick="location.href='view.html'">
            صفحة عرض العميل
          </button>
        </div>
      </div>

      <div class="heroRight">
        <img src="images/washer-hero.png" class="heroProduct" id="heroImg">
      </div>

    </div>
  </div>
</section>

<!-- CATEGORIES -->
<section class="cardsSection">
<h2 id="sectionTitle">الأقسام</h2>

<div class="grid">

<div class="card">
<div class="p">
<div class="name">تكييفات</div>
<button class="btn btnAdd" onclick="location.href='ac.html'">دخول</button>
</div>
</div>

<div class="card">
<div class="p">
<div class="name">غسالات</div>
<button class="btn btnAdd" onclick="location.href='washers.html'">دخول</button>
</div>
</div>

<div class="card">
<div class="p">
<div class="name">ثلاجات</div>
<button class="btn btnAdd" onclick="location.href='fridges.html'">دخول</button>
</div>
</div>

<div class="card">
<div class="p">
<div class="name">Built-in</div>
<button class="btn btnAdd" onclick="location.href='builtin.html'">دخول</button>
</div>
</div>

</div>
</section>

</div>

<a class="fabWhats" href="https://wa.me/201000000000" target="_blank">💬</a>

<script>

/* ===== CINEMATIC TEXT FADE ===== */

window.addEventListener("load",()=>{
  document.querySelector(".heroTitle").style.opacity=1;
  document.querySelector(".heroTitle").style.transform="translateY(0)";
  
  setTimeout(()=>{
    document.querySelector(".heroSub").style.opacity=1;
    document.querySelector(".heroSub").style.transform="translateY(0)";
  },200);

  setTimeout(()=>{
    document.querySelector(".heroButtons").style.opacity=1;
    document.querySelector(".heroButtons").style.transform="translateY(0)";
  },400);
});

/* ===== PARALLAX IMAGE ===== */

const heroImg = document.getElementById("heroImg");

window.addEventListener("scroll",()=>{
  const scroll = window.scrollY;
  heroImg.style.transform = "translateY(" + scroll * 0.15 + "px)";
});

/* ===== SECTION REVEAL ===== */

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.style.opacity=1;
      entry.target.style.transform="translateY(0)";
    }
  });
},{threshold:.2});

observer.observe(document.getElementById("sectionTitle"));

</script>

</body>
</html>
